    <text x="120" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#1B3A5C">Flow</text>
  </g>

  <!-- "Flow" text -->
  <text x="72" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="32" fill="#2D3748">Flow</text>
  <!-- "Clean" text -->
