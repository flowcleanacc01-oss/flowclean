    <g clip-path="url(#circleClipFull)">
      <path d="M67 88 Q85 78 100 85 Q115 92 130 82 Q145 72 160 80 Q175 88 180 85 L180 140 L67 140 Z" fill="#3DD8D8"/>
      <path d="M67 95 Q85 85 100 92 Q120 102 140 88 Q155 78 175 90 L175 140 L67 140 Z" fill="#2CC5C5"/>
