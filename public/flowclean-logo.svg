  <rect x="8" y="66" width="55" height="7" rx="3.5" fill="#1B3A5C"/>
  <rect x="18" y="80" width="50" height="7" rx="3.5" fill="#1B3A5C"/>
  <rect x="30" y="94" width="42" height="7" rx="3.5" fill="#1B3A5C"/>

  <!-- Speed Lines - Cyan -->
  <rect x="12" y="59" width="52" height="6" rx="3" fill="#3DD8D8"/>
  <rect x="5" y="73" width="58" height="6" rx="3" fill="#3DD8D8"/>
  <rect x="15" y="87" width="48" height="6" rx="3" fill="#3DD8D8"/>
